        \ \"title\": \"STAC GeoParquet Metadata\",\n  \"description\": \"JSON Schema
        for STAC GeoParquet metadata stored in Parquet file metadata\",\n  \"type\":
        \"object\",\n  \"properties\": {\n    \"version\": {\n      \"type\": \"string\",\n
        \     \"const\": \"1.0.0\",\n      \"description\": \"The stac-geoparquet
        metadata version.\"\n    },\n    \"collections\": {\n      \"type\": \"object\",\n
        \     \"description\": \"A mapping from Collection ID to Collection object.
        As usual, the Collection ID used as the key of the mapping must match the
        ID in the Collection object.\",\n      \"additionalProperties\": {\n        \"type\":
        \"object\",\n        \"description\": \"This object represents a Collection
        in a SpatioTemporal Asset Catalog. Note that this object is not validated
        against the STAC Collection schema. You'll need to validate it separately
        from stac-geoparquet.\"\n      }\n    },\n    \"collection\": {\n      \"type\":
        \"object\",\n      \"description\": \"This object represents a Collection
        in a SpatioTemporal Asset Catalog. Note that this object is not validated
        against the STAC Collection schema. You'll need to validate it separately
        from stac-geoparquet.\",\n      \"deprecated\": true\n    }\n  },\n  \"required\":
        [\n    \"version\"\n  ]\n}\n"
